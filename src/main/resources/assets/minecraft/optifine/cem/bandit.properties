# EMF configuration for Bandit Entity
# Use name-based matching like other entities in this pack

# Default model
models.1=1

# Target by entity registry name
name.1=regex:(sengoku:bandit|bandit)

# Use the vindicator model with bow animation support
model=vindicator.jem
type=vindicator

